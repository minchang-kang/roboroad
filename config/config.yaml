# ─── RT / 타이밍 ──────────────────────────────────────
timing:
  gc_loop_hz: 250
  teleop_loop_hz: 500
  rtde_loop_hz: 500
  recorder_loop_hz: 30

# ─── Dynamixel ───────────────────────────────────────
dynamixel:
  port: "/dev/ttyUSB2"
  baudrate: 4000000
  queue_size: 30

# ─── FSR ─────────────────────────────────────────────
fsr:
  pressure_threshold: 0.5
  recv_port: 9090

# ─── Mouse (좌클릭 → SPRAY 플래그 + 다이나믹셀 모터 구동) ───
mouse:
  device_name: "Compx ATK Mouse 8K Dongle Mouse"   # /proc/bus/input/devices 의 N: 필드 값
  device_path: "/dev/input/event28"               # 직접 경로 지정 (있으면 device_name 무시)
  motor_id: 2                         # 스프레이 액추에이터 모터 ID
  goal_current: 7                     # 좌클릭 시 목표 전류 [LSB] (18.83 mA)
  return_current: 3                   # 손 뗄 때 복귀 전류 [LSB] (역방향)
  port: "/dev/ttyUSB0"                # 모터 전용 포트 (6축 로봇과 별도 USB 컨버터)
  baudrate: 4000000

# ─── UR ──────────────────────────────────────────────
ur:
  ip: "192.168.84.100"
  auto_home: true
  queue_size: 30
  # servoJ 파라미터
  servoj_lookahead_time: 0.05   # [s]
  servoj_gain: 300.0
  # 홈 위치 [deg]
  home_deg: [0, -90, 0, -90, 0, 0]

# ─── Teleop ───────────────────────────────────────────
teleop:
  # DXL CCW 방향 = URDF + 방향이면 1, 반대면 -1
  joint_direction: [1, -1, -1, 1, 1, 1]
  # DXL 중립(2048)이 대응하는 UR 관절각 [deg]
  home_offset_deg: [0, -90, 0, -90, 0, 0]
  # EMA 저역통과 필터 계수 (0~1, 클수록 응답 빠름 / 노이즈 많음)
  ema_alpha: 0.4

# ─── GC ──────────────────────────────────────────────
gc:
  urdf_path: "./URDF/####UR3e_Master_Device/urdf/####UR3e_Master_Device.urdf"
  gravity_gain: [1, 0.8, 1, 1, 1, 1]
  # DXL CCW = URDF + 방향이면 1, 반대면 -1
  joint_direction: [1, -1, -1, 1, 1, 1]
  # 축별 안전 게인 (0~1)
  current_gain: [0.8, 0.8, 0.8, 0.8, 0.8, 0.8]
  # 모터 토크 상수 Kt [Nm/A]
  kt: [1.37, 1.37, 1.30, 1.30, 1.30, 1.30]
  # 축별 전류 한계 [raw LSB]
  cur_limit: [1000, 1000, 800, 800, 800, 800]

# ─── Vision ──────────────────────────────────────────
vision:
  width: 640
  height: 480
  fps: 30
  queue_size: 30
  cameras:
    - device: "/dev/video6"
      role: "front"
    - device: "/dev/video12"
      role: "hand"
    - device: "/dev/video18"
      role: "back"

# ─── log (CSV 연속 로그, 항상 기록) ─────────────────────
log:
  dir: "log"

# ─── output (HDF5 저장, SAVING 플래그 ON 시에만) ─────────
output:
  path: "output/"
