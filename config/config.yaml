# ─── RT / 타이밍 ──────────────────────────────────────
timing:
  gc_loop_hz: 1000
  teleop_loop_hz: 500
  recorder_loop_hz: 50

# ─── Dynamixel ───────────────────────────────────────
dynamixel:
  port: "/dev/ttyUSB0"
  baudrate: 4000000

# ─── FSR ─────────────────────────────────────────────
fsr:
  pressure_threshold: 0.5
  recv_port: 9090

# ─── UR ──────────────────────────────────────────────
ur:
  ip: "192.168.84.100"
  auto_home: true
  # servoJ 파라미터
  servoj_lookahead_time: 0.05   # [s]
  servoj_gain: 300.0
  # 홈 위치 [deg]
  home_deg: [0, -90, 0, -90, 0, 0]

# ─── Teleop ───────────────────────────────────────────
teleop:
  # DXL CCW 방향 = URDF + 방향이면 1, 반대면 -1
  joint_direction: [1, -1, -1, 1, 1, 1]
  # DXL 중립(2048)이 대응하는 UR 관절각 [deg]
  home_offset_deg: [0, -90, 0, -90, 0, 0]
  # EMA 저역통과 필터 계수 (0~1, 클수록 응답 빠름 / 노이즈 많음)
  ema_alpha: 0.4

# ─── GC ──────────────────────────────────────────────
gc:
  urdf_path: "./URDF/UR3e_Master_Device/urdf/UR3e_Master_Device.urdf"
  gravity_gain: 1.0
  # DXL CCW = URDF + 방향이면 1, 반대면 -1
  joint_direction: [1, -1, -1, 1, 1, 1]
  # 축별 안전 게인 (0~1)
  current_gain: [0.8, 0.8, 0.8, 0.8, 0.8, 0.8]
  # 모터 토크 상수 Kt [Nm/A]
  kt: [1.37, 1.37, 1.30, 1.30, 1.30, 1.30]
  # 축별 전류 한계 [raw LSB]
  cur_limit: [1000, 1000, 800, 800, 800, 800]

# ─── Vision ──────────────────────────────────────────
vision:
  width: 640
  height: 480
  fps: 30
  queue_size: 30
  cameras:
    - device: "/dev/camera_0"
      role: "front"
    - device: "/dev/camera_1"
      role: "hand"

# ─── log (CSV 연속 로그, 항상 기록) ─────────────────────
log:
  dir: "log"

# ─── output (HDF5 저장, SAVING 플래그 ON 시에만) ─────────
output:
  path: "output/"
