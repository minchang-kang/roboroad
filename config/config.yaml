# ─── RT / 타이밍 ──────────────────────────────────────
gc_loop_hz: 1000
teleop_loop_hz: 500
recorder_loop_hz: 50

# ─── Dynamixel ───────────────────────────────────────
dynamixel_port: "/dev/ttyUSB0"
dynamixel_baudrate: 1000000

# ─── FSR ─────────────────────────────────────────────
fsr_pressure_threshold: 0.5
fsr_recv_port: 9090

# ─── UR ──────────────────────────────────────────────
ur_ip: "192.168.1.100"

# ─── GC ──────────────────────────────────────────────
urdf_path: "../urdf/UR3e_Master_Device.urdf"

# ─── Vision ──────────────────────────────────────────────
vision:
  width: 1280
  height: 720
  fps: 60
  queue_size: 30
  cameras:
    - device: "/dev/camera_0"
      role: "front"
    # - device: "/dev/camera_1"
    #   role: "hand"

# ─── data ──────────────────────────────────────────────
output_path: "output/"